# Only needed if the GitHub repo is PRIVATE. Copy to repo-secret.yaml, fill in a
# GitHub Personal Access Token (repo:read scope), and apply it. repo-secret.yaml is
# gitignored so the token is never committed. Public repos need no credentials.
apiVersion: v1
kind: Secret
metadata:
  name: instagram-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/dollarsmoney/Netflix-Canary-Deployment-Kubernetes.git
  username: dollarsmoney            # GitHub username (any non-empty value works with a PAT)
  password: REPLACE_WITH_GITHUB_PAT # PAT with read access to the repo
