# The API gateway (OpenResty) is the single public entry point. A k8s-specific
# nginx config replaces the baked-in one: it listens on port 80 (no forced HTTPS
# redirect) and proxies to the in-cluster Services. TLS is best terminated at the
# cloud load balancer / ingress in front of this Service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: instagram
data:
  default.conf: |
    upstream user_api    { server user:9000; }
    upstream post_api    { server post:9001; }
    upstream newsfeed_api { server newsfeed:9002; }
    upstream web_api     { server web:3000; }

    map $http_connection $connection_upgrade {
        "~*Upgrade" $http_connection;
        default keep-alive;
    }

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 50m;

        location / {
            proxy_pass http://web_api;
        }

        location /user-api/ {
            proxy_pass http://user_api/api/;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /post-api/ {
            proxy_pass http://post_api/api/;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /newsfeed-api/v1/ {
            proxy_pass http://newsfeed_api/api/v1/;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SignalR websocket hub
        location /hubs/newsfeed {
            proxy_pass http://newsfeed_api/hubs/newsfeed;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache off;
            proxy_buffering off;
            proxy_read_timeout 100s;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Aggregation endpoint handled by the bundled Lua script.
        location /api/v1/user-profile/ {
            content_by_lua_file /etc/nginx/conf.d/lua/agg.lua;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: instagram
  labels:
    app: gateway
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: instagram
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: instagram-gateway
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: gateway-config
