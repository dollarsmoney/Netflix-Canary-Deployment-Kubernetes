apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: instagram

resources:
  - namespace.yaml
  - secret.yaml
  - databases.yaml
  - user.yaml
  - post.yaml
  - newsfeed.yaml
  - web.yaml
  - gateway.yaml
  # Cluster has no default StorageClass (gp2 is not annotated default), so gp3 is enabled.
  - storageclass.yaml

# Seed the MySQL databases. These are copies of scripts/mysql/*.sql kept inside the
# kustomize root so `kubectl apply -k` works without relaxed load restrictions.
configMapGenerator:
  - name: mysql-initdb
    files:
      - db-init/migrate-user-service.sql
      - db-init/migrate-post-service.sql

generatorOptions:
  disableNameSuffixHash: true

# Argo CD reads these image pins from Git (the source of truth). To ship a new build,
# CI must commit an updated newTag here and push, e.g.:
#   kustomize edit set image instagram-user=<acct>.dkr.ecr.<region>.amazonaws.com/instagram-user:<sha>
#   git commit -am "Deploy <sha>" && git push
images:
  - name: instagram-user
    newName: 827566277132.dkr.ecr.us-east-1.amazonaws.com/instagram-user
    newTag: 8b7c210fbb6bed786c681ce0d7bdc0d12b059435
  - name: instagram-post
    newName: 827566277132.dkr.ecr.us-east-1.amazonaws.com/instagram-post
    newTag: 8b7c210fbb6bed786c681ce0d7bdc0d12b059435
  - name: instagram-newsfeed
    newName: 827566277132.dkr.ecr.us-east-1.amazonaws.com/instagram-newsfeed
    newTag: 8b7c210fbb6bed786c681ce0d7bdc0d12b059435
  - name: instagram-web
    newName: 827566277132.dkr.ecr.us-east-1.amazonaws.com/instagram-web
    newTag: 8b7c210fbb6bed786c681ce0d7bdc0d12b059435
  - name: instagram-gateway
    newName: 827566277132.dkr.ecr.us-east-1.amazonaws.com/instagram-gateway
    newTag: 8b7c210fbb6bed786c681ce0d7bdc0d12b059435
