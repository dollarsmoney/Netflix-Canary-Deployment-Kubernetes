apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: instagram
spec:
  selector:
    app: user
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: instagram
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: instagram-user
          ports:
            - containerPort: 9000
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            # Override the baked-in hostnames with the in-cluster Service names.
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: instagram-secrets
                  key: user-db-connection
            - name: rabbitmq__Hostnames__0
              value: rabbitmq
            - name: jwt__secretKey
              valueFrom:
                secretKeyRef:
                  name: instagram-secrets
                  key: jwt-secret
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              memory: 512Mi
